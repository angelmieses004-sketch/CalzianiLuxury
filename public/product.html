<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calziani</title>
  <link rel="stylesheet" href="/css/style.css?v=20260426g" />
  <link rel="stylesheet" href="/css/product.css" />
  <link rel="icon" href="/img/587730407_17843809347618797_3290323688225420457_n.jpg" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__logo">CALZIANI</a>
      <nav class="header__nav">
        <button class="nav-btn" data-cat="all" onclick="location.href='/'">Todo</button>
        <button class="nav-btn" data-cat="calzado" onclick="location.href='/?cat=calzado'">Calzado</button>
        <button class="nav-btn" data-cat="ropa" onclick="location.href='/?cat=ropa'">Ropa</button>
        <button class="nav-btn" data-cat="accesorio" onclick="location.href='/?cat=accesorio'">Accesorios</button>
      </nav>
      <div class="header__user" id="headerUser">
        <button class="user-btn" id="loginTrigger">Iniciar sesión</button>
      </div>
      <a href="/favoritos" class="fav-header-btn" aria-label="Favoritos" title="Mis favoritos">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="fav-header-count hidden" id="favHeaderCount">0</span>
      </a>
      <select class="currency-select" id="currencySelect" aria-label="Moneda">
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
        <option value="DOP">RD$ DOP</option>
      </select>
      <a href="/?cart=open" class="cart-btn" id="cartBtnProduct" aria-label="Carrito">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge hidden" id="cartBadgeProduct">0</span>
      </a>
    </div>
  </header>

  <!-- PRODUCT PAGE -->
  <main class="product-page" id="productPage">
    <div class="product-page__loading">Cargando...</div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__brand">CALZIANI</span>
      <div class="footer__contact">
        <a class="footer__contact-link" href="https://www.instagram.com/calziani.luxury?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          @calziani.luxury
        </a>
        <a class="footer__contact-link" href="tel:+18093076122">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3-8.59A2 2 0 0 1 3.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          +1 809 307-6122
        </a>
      </div>
      <span class="footer__copy">&copy; 2026 Todos los derechos reservados.</span>
    </div>
  </footer>

  <script src="/js/product.js"></script>
</body>
</html>
