  <style>
    .reset-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .reset-card {
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .reset-brand {
      text-align: center;
    }

    .reset-brand__logo {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #111;
    }

    .reset-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #f5f5f5;
      border-radius: 50%;
      margin: 0 auto;
    }

    .reset-title {
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      color: #111;
      letter-spacing: -0.01em;
    }

    .reset-sub {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      line-height: 1.6;
    }

    .reset-fields {
      border: 1.5px solid #e8e8e8;
      border-radius: 3px;
      overflow: hidden;
    }

    .reset-field {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #e8e8e8;
    }
    .reset-field:last-child { border-bottom: none; }

    .reset-field label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #aaa;
      padding: 0.65rem 1rem 0.2rem;
    }

    .reset-field input {
      border: none;
      padding: 0.35rem 1rem 0.65rem;
      font-size: 0.95rem;
      color: #111;
      background: transparent;
      outline: none;
      width: 100%;
      font-family: inherit;
    }
    .reset-field input:focus { background: #fafafa; }
    .reset-field input::placeholder { color: #ccc; }

    .reset-submit {
      width: 100%;
      padding: 0.9rem;
      background: #111;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .reset-submit:hover { background: #333; }
    .reset-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .reset-error {
      font-size: 0.82rem;
      color: #c0392b;
      padding: 0.65rem 0.9rem;
      background: #fff5f5;
      border: 1px solid #f5c6c6;
      border-radius: 2px;
    }

    .reset-success {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .reset-success__icon {
      width: 56px;
      height: 56px;
      background: #f0faf0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reset-success__title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #111;
    }

    .reset-success__text {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.6;
    }

    .reset-back-link {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #111;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .reset-back-link:hover { background: #333; }

    .reset-invalid {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .reset-invalid__icon {
      width: 56px;
      height: 56px;
      background: #fff5f5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
  </style>

<body>

  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__logo">CALZIANI</a>
    </div>
  </header>

  <main class="reset-page">
    <div class="reset-card" id="resetCard">
      <div class="reset-brand">
        <span class="reset-brand__logo">CALZIANI</span>
      </div>
      <p style="text-align:center;color:#aaa;font-size:0.85rem;">Verificando enlace...</p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__brand">CALZIANI</span>
      <span class="footer__copy">&copy; 2026 Todos los derechos reservados.</span>
    </div>
  </footer>

  <script>
  (() => {
    const card  = document.getElementById('resetCard');
    const token = new URLSearchParams(location.search).get('token');

    function renderInvalid(msg) {
      card.innerHTML = `
        <div class="reset-brand"><span class="reset-brand__logo">CALZIANI</span></div>
        <div class="reset-invalid">
          <div class="reset-invalid__icon">🔒</div>
          <p class="reset-title">Enlace inválido</p>
          <p class="reset-sub">${msg}</p>
          <a href="/" class="reset-back-link">Volver a la tienda</a>
        </div>`;
    }

    function renderSuccess() {
      card.innerHTML = `
        <div class="reset-brand"><span class="reset-brand__logo">CALZIANI</span></div>
        <div class="reset-success">
          <div class="reset-success__icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <p class="reset-success__title">¡Contraseña actualizada!</p>
          <p class="reset-success__text">Tu contraseña fue cambiada correctamente. Ya podés iniciar sesión.</p>
          <a href="/" class="reset-back-link">Ir a la tienda</a>
        </div>`;
    }

    function renderForm() {
      card.innerHTML = `
        <div class="reset-brand"><span class="reset-brand__logo">CALZIANI</span></div>
        <div class="reset-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1" fill="#111"/></svg>
        </div>
        <p class="reset-title">Nueva contraseña</p>
        <p class="reset-sub">Elegí una contraseña nueva para tu cuenta.</p>
        <div class="reset-fields">
          <div class="reset-field">
            <label>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Nueva contraseña
            </label>
            <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
          </div>
          <div class="reset-field">
            <label>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Repetir contraseña
            </label>
            <input type="password" id="confirmPassword" placeholder="Repetí la contraseña" autocomplete="new-password" />
          </div>
        </div>
        <div id="resetError" class="reset-error hidden" style="display:none"></div>
        <button class="reset-submit" id="resetBtn">Guardar contraseña</button>`;

      document.getElementById('resetBtn').addEventListener('click', async () => {
        const errorEl = document.getElementById('resetError');
        errorEl.style.display = 'none';

        const pass    = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (!pass || pass.length < 6) {
          errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres.';
          errorEl.style.display = 'block'; return;
        }
        if (pass !== confirm) {
          errorEl.textContent = 'Las contraseñas no coinciden.';
          errorEl.style.display = 'block'; return;
        }

        const btn = document.getElementById('resetBtn');
        btn.disabled = true;
        btn.textContent = 'Guardando...';

        try {
          const res  = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password: pass }),
          });
          const data = await res.json();
          if (!res.ok) {
            errorEl.textContent = data.error;
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Guardar contraseña';
            return;
          }
          renderSuccess();
        } catch {
          errorEl.textContent = 'Error de conexión.';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Guardar contraseña';
        }
      });

      // Allow Enter key
      ['newPassword','confirmPassword'].forEach(id => {
        document.getElementById(id)?.addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('resetBtn')?.click();
        });
      });
    }

    async function init() {
      if (!token) { renderInvalid('Este enlace no es válido.'); return; }
      try {
        const res  = await fetch(`/api/auth/validate-reset-token?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!data.valid) {
          renderInvalid('Este enlace expiró o ya fue utilizado. Solicitá uno nuevo desde la tienda.');
          return;
        }
        renderForm();
      } catch {
        renderInvalid('No se pudo verificar el enlace. Intentá de nuevo.');
      }
    }

    init();
  })();
  </script>
  <script src="/js/whatsapp-float.js"></script>
</body>
</html>
