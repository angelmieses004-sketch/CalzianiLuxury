<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago exitoso — Calziani</title>
  <link rel="stylesheet" href="/css/style.css?v=20260426g" />
  <link rel="icon" href="/img/587730407_17843809347618797_3290323688225420457_n.jpg" />
  <style>
    .pay-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .pay-icon { width: 72px; height: 72px; background: #f0fdf4; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .pay-title { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
    .pay-sub { font-size: 0.9rem; color: #666; margin-bottom: 0.75rem; }
    .pay-order { font-size: 0.8rem; color: #999; margin-bottom: 2rem; font-family: monospace; }
    .pay-track { margin: -0.75rem 0 1.5rem; font-size: 0.86rem; color: #374151; }
    .pay-track a { color: #111; font-weight: 700; text-decoration: underline; }
    .pay-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .pay-btn { padding: 0.75rem 2rem; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 2px; }
    .pay-btn-primary { background: #111; color: #fff; }
    .pay-btn-primary:hover { opacity: 0.85; }
    .pay-btn-secondary { border: 1px solid #e0e0e0; color: #111; }
    .pay-btn-secondary:hover { background: #f5f5f5; }
  </style>

  <!-- Meta Pixel Code -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '1453546619905126');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=1453546619905126&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Meta Pixel Code -->
  <script src="/js/pixel.js"></script>
</head>
<body>
  <div class="pay-page">
    <div class="pay-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 class="pay-title">¡Pago aprobado!</h1>
    <p class="pay-sub" id="paySuccessSub">Tu pedido fue procesado correctamente. Gracias por comprar en Calziani.</p>
    <p class="pay-order" id="orderRef"></p>
    <p class="pay-track" id="trackRef" hidden></p>
    <div class="pay-actions">
      <a href="/" class="pay-btn pay-btn-primary">Seguir comprando</a>
      <a href="https://www.instagram.com/calziani.luxury" target="_blank" class="pay-btn pay-btn-secondary">Seguinos en Instagram</a>
    </div>
  </div>
  <script>
    (async () => {
      const params       = new URLSearchParams(location.search);
      // Resolve order ID: URL param → pending_purchase → pending_order
      const orderFromUrl = params.get('order');
      const purchaseRaw  = JSON.parse(localStorage.getItem('calziani_pending_purchase') || 'null');
      const orderId      = orderFromUrl
        || (purchaseRaw && purchaseRaw.orderId)
        || localStorage.getItem('calziani_pending_order')
        || '';
      const trackingCode = (purchaseRaw && purchaseRaw.trackingCode) || '';
      const trackingUrl  = (purchaseRaw && purchaseRaw.trackingUrl)
        || (trackingCode ? `${location.origin}/tracking?code=${encodeURIComponent(trackingCode)}` : '');

      if (orderId) document.getElementById('orderRef').textContent = 'Número de orden: ' + orderId;
      if (trackingUrl) {
        const trk = document.getElementById('trackRef');
        trk.innerHTML = `Seguimiento de pedido: <a href="${trackingUrl}">${trackingCode || 'Ver tracking'}</a>`;
        trk.hidden = false;
      }

      // Clear cart
      localStorage.removeItem('calziani_cart');

      // Fire Purchase exactly once per session
      if (purchaseRaw && !sessionStorage.getItem('fbq_purchase_fired')) {
        sessionStorage.setItem('fbq_purchase_fired', '1');
        if (purchaseRaw.name || purchaseRaw.phone) {
          window.CalzianiPixel?.setAdvancedMatching({
            name:  purchaseRaw.name    || '',
            phone: purchaseRaw.phone   || '',
          });
        }
        await window.CalzianiPixel?.trackPurchase(
          { total: purchaseRaw.total, numItems: purchaseRaw.numItems, orderId }
        );
        localStorage.removeItem('calziani_pending_purchase');
        localStorage.removeItem('calziani_pending_order');
      }
    })();
  </script>
  <script src="/js/whatsapp-float.js"></script>
</body>
</html>
