<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago cancelado — Calziani</title>
  <link rel="stylesheet" href="/css/style.css?v=20260426d" />
  <link rel="icon" href="/img/587730407_17843809347618797_3290323688225420457_n.jpg" />
  <style>
    .pay-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .pay-icon { width: 72px; height: 72px; background: #fef2f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .pay-title { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
    .pay-sub { font-size: 0.9rem; color: #666; margin-bottom: 2rem; }
    .pay-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .pay-btn { padding: 0.75rem 2rem; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 2px; }
    .pay-btn-primary { background: #111; color: #fff; }
    .pay-btn-primary:hover { opacity: 0.85; }
    .pay-btn-secondary { border: 1px solid #e0e0e0; color: #111; }
    .pay-btn-secondary:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="pay-page">
    <div class="pay-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <h1 class="pay-title">Pago cancelado</h1>
    <p class="pay-sub">Tu pedido no fue procesado. Podés intentarlo nuevamente.</p>
    <div class="pay-actions">
      <a href="/" class="pay-btn pay-btn-primary">Volver a la tienda</a>
    </div>
  </div>
</body>
</html>
